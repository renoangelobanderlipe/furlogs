name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: furlogs_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Bun (JS toolchain) ────────────────────────────────────────────────
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── PHP (Laravel backend) ─────────────────────────────────────────────
      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, openssl, bcmath, ctype, json
          coverage: none

      # ── Dependency caching ────────────────────────────────────────────────
      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: apps/server/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('apps/server/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Cache Bun modules
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install Composer dependencies
        run: composer install --no-progress --no-interaction --prefer-dist --working-dir=apps/server

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # ── Laravel environment ───────────────────────────────────────────────
      - name: Set up testing environment file
        run: cp apps/server/.env.testing.ci apps/server/.env.testing

      - name: Inject APP_KEY into .env.testing
        run: |
          APP_KEY="base64:$(openssl rand -base64 32)"
          sed -i "s|APP_KEY=|APP_KEY=${APP_KEY}|" apps/server/.env.testing

      # ── Playwright browsers ───────────────────────────────────────────────
      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      # ── Frontend production build ─────────────────────────────────────────
      # playwright.config.ts uses `next start` in CI so the app must be built
      # before Playwright launches it.
      - name: Build Next.js
        run: bun run build:web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      # ── Run tests ─────────────────────────────────────────────────────────
      - name: Run Playwright E2E tests
        run: bun run test:e2e
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000

      # ── Artifacts ─────────────────────────────────────────────────────────
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results on failure (videos + traces)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7
