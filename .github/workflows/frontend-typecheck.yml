name: Frontend Typecheck

on:
  push:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/frontend-typecheck.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/web/**"
      - ".github/workflows/frontend-typecheck.yml"

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run --cwd apps/web node_modules/.bin/tsc --noEmit
