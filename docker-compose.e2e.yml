services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: furlogs_e2e
    ports:
      - "5432:5432"
    # tmpfs keeps the data in memory — fast wipes between runs, no leftover state.
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d furlogs_e2e"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s
